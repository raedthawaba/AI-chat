model:
  name: "arabic_llama_pro_v1"
  vocab_size: 8000
  d_model: 128
  n_heads: 4
  n_kv_heads: 2
  num_layers: 4
  dim_feedforward: 512
  max_seq_len: 128
  norm_eps: 1e-5

training:
  epochs: 1
  batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 1e-4
  min_learning_rate: 1e-5
  weight_decay: 0.1
  grad_clip: 1.0
  warmup_steps: 100
  log_interval: 10
  eval_interval: 100
  save_interval: 100
